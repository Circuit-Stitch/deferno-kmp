// Hydraulic Conveyor packaging config for the Deferno desktop app (ADR-0021, #102/#103).
//
// `conveyor make site` produces, for every target machine below: a Linux `.deb` + distribution-
// independent tarball + signed apt repo (no RPM/yum — the accepted Fedora gap in ADR-0021, #105), a
// Windows MSIX + `.appinstaller` + installer EXE, and per-arch macOS app ZIPs + Sparkle appcasts.
// `conveyor make copied-site` additionally publishes them + the update metadata to a public GitHub
// Release. Windows + macOS are **self-signed for now** (#103): Conveyor signs them with the root key
// via a generated self-signed cert, so installs show an OS warning (SmartScreen / Gatekeeper) until
// production signing — Apple notarization + Windows Authenticode — lands in #104. Self-update is
// **Windows + macOS only** (MSIX block-map deltas / macOS Sparkle deltas, background + on-restart);
// on Linux the package manager / distro repo updates the app (ADR-0021, #105). The in-app
// "Check for updates" affordance drives Conveyor's update engine via `dev.hydraulic.conveyor:
// conveyor-control` (app/desktopApp; see desktop `update/` package).
//
// Conveyor docs: https://conveyor.hydraulic.dev/22.0/  ·  CLI is run in CI via the official
// `hydraulic-software/conveyor/actions/build@v22.0` action (see .github/workflows/release.yml).

// Import the desktop module's build config: main class + JVM args from `compose.desktop.application`,
// and crucially `app.version` from Gradle `project.version` (= ProjectConfig.APP_VERSION, the single
// version source of truth, #101). The task lives on the :app:desktopApp subproject; `-q` keeps
// Gradle's own logging out of the HOCON stream so the include parses.
include "#!./gradlew -q :app:desktopApp:printConveyorConfig"

// Bundled runtime: **Eclipse Temurin / OpenJDK 17** on every machine — the JDK the Conveyor Gradle
// plugin auto-imports from the desktop module's toolchain (the import above emits
// `/stdlib/jdk/17/openjdk.conf`). The desktop standardizes on Temurin everywhere — dev `run`, jpackage,
// and this Conveyor package all share it; there is no JetBrains Runtime (the JBR rendering advantage was
// a misdiagnosis — ADR-0021, see app/desktopApp/build.gradle.kts). Conveyor `jlink`s whatever JDK input
// it imports, and a full Temurin JDK ships jmods, so no extra include or runtime override is needed.

app {
  display-name = "Deferno"
  fsname = "deferno"
  // Reverse-DNS application id. The Gradle `group` Conveyor would otherwise import ("Deferno.app") is
  // not reverse-DNS, so pin it to the real app id (matches the Android applicationId).
  rdns-name = "com.circuitstitch.deferno"
  vendor = "Circuit Stitch"

  // App icon: the square brand flame (the same mark used as the Android launcher foreground). One
  // square source — Conveyor rasterizes it into every per-OS format it needs (Windows .ico, Linux
  // hicolor PNGs, the installer/shortcut art). SVG so it stays crisp at every size; path is relative
  // to this conveyor.conf (repo root). Without it Conveyor ships a generic placeholder icon. NOTE:
  // this is the adaptive-icon FOREGROUND (transparent, with safe-zone padding), so the desktop icon
  // has no background fill — fine for the dogfood; a composed-on-brand-background icon is a polish
  // follow-up.
  icons = "core/designsystem/brand/flame.svg"

  // Descriptive SPDX metadata. The FREE open-source Conveyor license is unlocked separately, by
  // `vcs-url` pointing at the public source repo below (ADR-0020/0021).
  license = "Apache-2.0"

  // The public GitHub repo. Setting this (a) activates Conveyor's free OSS license, and (b) defaults
  // `app.site.base-url` to https://github.com/Circuit-Stitch/deferno-kmp/releases/latest/download and
  // `app.site.copy-to` to github:Circuit-Stitch/deferno-kmp — so `make copied-site` publishes to
  // GitHub Releases with zero hand-written URLs.
  vcs-url = "github.com/Circuit-Stitch/deferno-kmp"

  // Target machines (ADR-0021, #103): Linux + Windows + macOS (Intel + Apple Silicon), ALL cross-built
  // from the single Linux CI runner — Conveyor needs no per-OS runner matrix and no Mac. macOS is
  // **self-signed** for now (Conveyor generates a self-signed cert from the root key; Gatekeeper warns
  // until Apple Developer ID + notarization land in #104 — additive, secrets-only). The per-arch Skiko
  // native jars are supplied via the `linuxAmd64`/`windowsAmd64`/`macAmd64`/`macAarch64` Conveyor
  // inputs in app/desktopApp/build.gradle.kts; the Temurin runtime for each machine comes from the
  // auto-imported `openjdk.conf` (see the runtime note above). Without this line Conveyor's default set
  // is used; pinning it keeps the target set explicit.
  machines = [ linux.amd64.glibc, windows.amd64, mac.amd64, mac.aarch64 ]

  site {
    github {
      // OAuth token used ONLY to upload the Release, read from the environment at publish time so no
      // credential is ever committed or embedded in the artifact. The release workflow sets
      // OAUTH_TOKEN from the Actions-provided GITHUB_TOKEN (contents: write).
      oauth-token = ${env.OAUTH_TOKEN}
    }
  }

  // NOTE: `app.version` is intentionally NOT set here — it is imported from Gradle `project.version`
  // by the printConveyorConfig include above, keeping ProjectConfig.APP_VERSION the single source of
  // truth. Conveyor names the GitHub Release/tag after `app.version` verbatim (e.g. "0.1.0"), which is
  // why the release trigger tag is the bare semver with no `v` prefix (see the release workflow).
}
