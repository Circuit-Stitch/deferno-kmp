# Robolectric config for the JVM-fast Compose UI + Roborazzi screenshot tests (#27, ADR-0006).
# NATIVE graphics renders real pixels (required by Roborazzi). A fixed phone qualifier keeps
# screenshots deterministic across machines.
#
# Use the no-op base Application, not the manifest's DefernoApplication (#68): the real Application
# builds the DI graph + seeds dev Accounts at startup, which touches the AndroidKeyStore — unsupported
# under Robolectric. These tests render Views/screens over fakes and never need the real graph.
application=android.app.Application
sdk=34
graphicsMode=NATIVE
qualifiers=w360dp-h760dp-xhdpi
