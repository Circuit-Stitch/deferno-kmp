[versions]
agp = "9.2.1"
kotlin = "2.4.0"
kover = "0.9.8"
# Compile-time DI (ADR-0003 / ADR-0008): kotlin-inject + kotlin-inject-anvil via KSP.
# KSP2 is version-decoupled from the Kotlin compiler (no `<kotlin>-<ksp>` suffix); 2.3.9
# is the pairing the official KSP quickstart shows for Kotlin 2.4.0.
ksp = "2.3.9"
kotlinInject = "0.9.0"
kotlinInjectAnvil = "0.1.7"
coreKtx = "1.15.0"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
lifecycleRuntimeKtx = "2.8.7"
activityCompose = "1.9.3"
composeBom = "2026.05.01"
# Compose Multiplatform Gradle plugin (ADR-0003: desktop View = Compose Desktop) —
# Compose runtime + the desktop packaging DSL. The Compose *compiler* is the separate
# `kotlin-compose` plugin below (pinned to `kotlin`); that compiler plugin is what keeps
# CM Kotlin-2.4.0-safe, so no CM release has to certify 2.4.0 by name.
composeMultiplatform = "1.11.1"
# iOS Swift bridging (ADR-0003): SKIE. NOT WIRED YET — no released SKIE supports Kotlin
# 2.4.0 as of 2026-06 (latest 0.10.12 tops out at Kotlin 2.3.10), and SKIE asserts the
# Kotlin version at *configuration* time, so applying it would fail Gradle sync on every
# host (Linux included), not just the macOS link step. When a 2.4.0-compatible SKIE ships:
# uncomment here + in [plugins], apply `alias(libs.plugins.skie)` in app/iosApp, and switch
# its feature deps to `export(...)`. Track https://github.com/touchlab/SKIE/releases
# skie = "0.10.12"

[libraries]
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
androidx-lifecycle-runtime-ktx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtx" }
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }
androidx-compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "composeBom" }
androidx-ui = { group = "androidx.compose.ui", name = "ui" }
androidx-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics" }
androidx-ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling" }
androidx-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview" }
androidx-ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" }
androidx-ui-test-junit4 = { group = "androidx.compose.ui", name = "ui-test-junit4" }
androidx-material3 = { group = "androidx.compose.material3", name = "material3" }
kotlin-test = { group = "org.jetbrains.kotlin", name = "kotlin-test", version.ref = "kotlin" }
junit = { group = "junit", name = "junit", version.ref = "junit" }

# Compile-time DI runtimes (commonMain) + KSP processors (per target). Use the `-kmp`
# kotlin-inject runtime variant; the anvil `runtime-optional` artifact supplies @SingleIn.
kotlin-inject-runtime = { group = "me.tatarka.inject", name = "kotlin-inject-runtime-kmp", version.ref = "kotlinInject" }
kotlin-inject-compiler = { group = "me.tatarka.inject", name = "kotlin-inject-compiler-ksp", version.ref = "kotlinInject" }
kotlin-inject-anvil-runtime = { group = "software.amazon.lastmile.kotlin.inject.anvil", name = "runtime", version.ref = "kotlinInjectAnvil" }
kotlin-inject-anvil-runtimeOptional = { group = "software.amazon.lastmile.kotlin.inject.anvil", name = "runtime-optional", version.ref = "kotlinInjectAnvil" }
kotlin-inject-anvil-compiler = { group = "software.amazon.lastmile.kotlin.inject.anvil", name = "compiler", version.ref = "kotlinInjectAnvil" }

# Gradle-plugin artifacts on the build-logic classpath (so convention plugins can
# apply + type-safely configure AGP and the Kotlin Multiplatform plugin).
android-gradlePlugin = { group = "com.android.tools.build", name = "gradle", version.ref = "agp" }
kotlin-gradlePlugin = { group = "org.jetbrains.kotlin", name = "kotlin-gradle-plugin", version.ref = "kotlin" }
kover-gradlePlugin = { group = "org.jetbrains.kotlinx", name = "kover-gradle-plugin", version.ref = "kover" }
ksp-gradlePlugin = { group = "com.google.devtools.ksp", name = "symbol-processing-gradle-plugin", version.ref = "ksp" }
androidx-junit = { group = "androidx.test.ext", name = "junit", version.ref = "junitVersion" }
androidx-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "espressoCore" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-kotlin-multiplatform-library = { id = "com.android.kotlin.multiplatform.library", version.ref = "agp" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
compose-multiplatform = { id = "org.jetbrains.compose", version.ref = "composeMultiplatform" }
kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "kover" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
# skie = { id = "co.touchlab.skie", version.ref = "skie" }   # deferred — see [versions] note
